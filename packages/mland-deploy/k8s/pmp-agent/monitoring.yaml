# Mland PMP Agent — Monitoring & Alerting (Pro)
# isPro: true — 7x24 小时监控告警
apiVersion: v1
kind: ConfigMap
metadata:
  name: mland-pmp-prometheus-rules
  namespace: mland
  labels:
    mland.io/isPro: "true"
data:
  alert-rules.yml: |
    groups:
      - name: mland-pmp-agent
        rules:
          - alert: PmpAgentDown
            expr: up{job="mland-pmp-agent"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PMP Agent 服务不可用"
              description: "航天中心医院 PMP 智能体已离线超过 1 分钟"
          - alert: PmpAgentHighLatency
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="mland-pmp-agent"}[5m])) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PMP Agent 响应延迟过高"
          - alert: PmpAgentErrorRate
            expr: rate(http_requests_total{job="mland-pmp-agent",status=~"5.."}[5m]) / rate(http_requests_total{job="mland-pmp-agent"}[5m]) > 0.05
            for: 3m
            labels:
              severity: critical
            annotations:
              summary: "PMP Agent 错误率超过 5%"
---
apiVersion: v1
kind: Service
metadata:
  name: mland-pmp-agent
  namespace: mland
spec:
  selector:
    app: mland-pmp-agent
  ports:
    - port: 8080
      targetPort: 8080
